<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Proxy Web</h1>
        <div class="search-box">
            <input type="text" id="url" placeholder="Entrez l'URL du site à visiter">
            <button id="goBtn">Aller</button>
        </div>
        <div id="loading" class="hidden">Chargement...</div>
        <iframe id="content" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
    </div>
    <script src="script.js"></script>
</body>
</html>
